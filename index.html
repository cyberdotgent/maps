<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Maps</title>
	<link rel="stylesheet" href="assets/vendor/bootstrap/css/bootstrap.min.css">
	<link rel="stylesheet" href="assets/vendor/leaflet/leaflet.css">
	<style>
		:root {
			--app-header-height: 68px;
			--app-header-bg: linear-gradient(135deg, #0f172a 0%, #1f2937 55%, #111827 100%);
			--app-header-fg: #f8fafc;
			--app-surface: rgba(15, 23, 42, 0.88);
		}

		html,
		body {
			height: 100%;
		}

		body {
			margin: 0;
			overflow: hidden;
			background: #e5e7eb;
		}

		.app-navbar {
			height: var(--app-header-height);
			background: var(--app-header-bg);
			color: var(--app-header-fg);
			box-shadow: 0 1rem 2rem rgba(15, 23, 42, 0.18);
		}

		.app-brand {
			font-size: 1.15rem;
			letter-spacing: 0.02em;
		}

		.search-form {
			width: min(100%, 31rem);
		}

		.search-shell {
			position: relative;
		}

		.search-form .form-control {
			border: 0;
			box-shadow: none;
		}

		.search-form .btn {
			border: 0;
		}

		.search-form .input-group {
			border-radius: 999px;
			overflow: hidden;
			box-shadow: 0 0.75rem 1.5rem rgba(15, 23, 42, 0.18);
		}

		.search-suggestions {
			position: absolute;
			top: calc(100% + 0.5rem);
			left: 0;
			right: 0;
			z-index: 1050;
			display: none;
			padding: 0.35rem;
			border: 0;
			border-radius: 1rem;
			background: rgba(15, 23, 42, 0.96);
			box-shadow: 0 1rem 2rem rgba(15, 23, 42, 0.24);
			backdrop-filter: blur(12px);
		}

		.search-suggestions .dropdown-item {
			border-radius: 0.75rem;
			white-space: normal;
		}

		.search-suggestions .dropdown-item.active,
		.search-suggestions .dropdown-item:active {
			background: rgba(248, 250, 252, 0.16);
			color: #f8fafc;
		}

		.search-suggestions .suggestion-title {
			display: block;
			font-weight: 600;
			line-height: 1.25;
		}

		.search-suggestions .suggestion-subtitle {
			display: block;
			font-size: 0.8rem;
			color: rgba(248, 250, 252, 0.72);
			line-height: 1.25;
			margin-top: 0.15rem;
		}

		#map {
			position: absolute;
			inset: var(--app-header-height) 0 0 0;
			background: #dbe4ea;
		}

		.status-chip {
			position: absolute;
			top: calc(var(--app-header-height) + 1rem);
			left: 1rem;
			z-index: 1000;
			max-width: min(90vw, 28rem);
			display: none;
			border: 0;
			box-shadow: 0 1rem 2rem rgba(15, 23, 42, 0.16);
			backdrop-filter: blur(10px);
			background: rgba(15, 23, 42, 0.9);
			color: #f8fafc;
		}

		.leaflet-container {
			font-family: var(--bs-body-font-family);
		}

		.leaflet-popup-content-wrapper,
		.leaflet-popup-tip {
			background: var(--app-surface);
			color: #f8fafc;
		}

		.leaflet-popup-content {
			margin: 0.85rem 1rem;
		}

		.map-popup {
			min-width: min(100vw - 4rem, 24rem);
			max-width: 26rem;
		}

		.map-popup h5 {
			font-size: 1rem;
			line-height: 1.3;
		}

		.map-popup .muted {
			color: rgba(248, 250, 252, 0.7);
		}

		.map-popup .kv {
			display: grid;
			grid-template-columns: 7rem minmax(0, 1fr);
			gap: 0.3rem 0.75rem;
			font-size: 0.875rem;
		}

		.map-popup .kv dt {
			font-weight: 600;
			color: rgba(248, 250, 252, 0.8);
		}

		.map-popup .kv dd {
			margin: 0;
			word-break: break-word;
		}

		.map-popup .badge {
			font-weight: 600;
		}

		@media (max-width: 767.98px) {
			.app-navbar {
				height: auto;
				padding-top: 0.75rem;
				padding-bottom: 0.75rem;
			}

			#map {
				inset: 5.75rem 0 0 0;
			}

			.status-chip {
				top: calc(5.75rem + 1rem);
			}

			.search-form {
				width: 100%;
				margin-top: 0.5rem;
			}
		}
	</style>
</head>
<body>
	<nav class="navbar navbar-expand-md app-navbar fixed-top">
		<div class="container-fluid gap-3 align-items-md-center">
			<div class="navbar-brand app-brand fw-semibold text-white mb-0">Maps</div>
			<div class="search-shell search-form ms-md-auto">
				<form id="search-form">
					<div class="input-group input-group-lg">
						<input
							id="search-input"
							class="form-control"
							type="search"
							placeholder="Search places"
							aria-label="Search places"
							autocomplete="off"
							aria-autocomplete="list"
							aria-expanded="false"
							aria-controls="search-suggestions"
						>
						<button id="search-button" class="btn btn-light fw-semibold" type="submit">
							Search
						</button>
					</div>
				</form>
				<div id="search-suggestions" class="search-suggestions dropdown-menu dropdown-menu-dark"></div>
			</div>
		</div>
	</nav>

	<div id="map" aria-label="Map view"></div>
	<div id="status-chip" class="status-chip badge rounded-pill py-3 px-4"></div>

	<script src="assets/vendor/jquery/jquery.min.js"></script>
	<script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
	<script src="assets/vendor/leaflet/leaflet.js"></script>
	<script>
		(function () {
			const NOMINATIM_BASE = '/api';
			const SEARCH_ENDPOINT = `${NOMINATIM_BASE}/search.php`;
			const REVERSE_ENDPOINT = `${NOMINATIM_BASE}/reverse.php`;
			const DEFAULT_CENTER = [50.8503, 4.3517];
			const DEFAULT_ZOOM = 12;

			L.Icon.Default.mergeOptions({
				iconRetinaUrl: '/assets/vendor/leaflet/images/marker-icon-2x.png',
				iconUrl: '/assets/vendor/leaflet/images/marker-icon.png',
				shadowUrl: '/assets/vendor/leaflet/images/marker-shadow.png'
			});

			const map = L.map('map', {
				zoomControl: true,
				preferCanvas: true
			}).setView(DEFAULT_CENTER, DEFAULT_ZOOM);

			L.tileLayer('/tiles/{z}/{x}/{y}.png', {
				maxZoom: 19,
				attribution: '&copy; OpenStreetMap contributors, tiles served locally'
			}).addTo(map);

			const statusChip = $('#status-chip');
			const searchButton = $('#search-button');
			const searchInput = $('#search-input');
			const form = $('#search-form');
			const suggestions = $('#search-suggestions');

			let marker = null;
			let activeSearchRequest = null;
			let activeReverseRequest = null;
			let activeSuggestionRequest = null;
			let searchToken = 0;
			let suggestionToken = 0;
			let suggestionTimer = null;
			let suggestionItems = [];
			let highlightedSuggestionIndex = -1;

			function escapeHtml(value) {
				return String(value ?? '').replace(/[&<>"']/g, function (character) {
					return ({
						'&': '&amp;',
						'<': '&lt;',
						'>': '&gt;',
						'"': '&quot;',
						"'": '&#39;'
					})[character];
				});
			}

			function showStatus(message, variant) {
				statusChip
					.text(message)
					.removeClass('bg-danger bg-success bg-warning text-dark')
					.addClass(variant === 'error' ? 'bg-danger' : variant === 'success' ? 'bg-success' : 'bg-warning text-dark')
					.stop(true, true)
					.fadeIn(120);
			}

			function hideStatus() {
				statusChip.stop(true, true).fadeOut(120);
			}

			function cancelSuggestionRequests() {
				suggestionToken += 1;

				if (suggestionTimer) {
					window.clearTimeout(suggestionTimer);
					suggestionTimer = null;
				}

				if (activeSuggestionRequest && activeSuggestionRequest.abort) {
					activeSuggestionRequest.abort();
				}

				activeSuggestionRequest = null;
			}

			function hideSuggestions() {
				suggestions.hide().empty();
				searchInput.attr('aria-expanded', 'false');
				suggestionItems = [];
				highlightedSuggestionIndex = -1;
			}

			function highlightSuggestion(index) {
				const items = suggestions.find('[data-suggestion-index]');

				if (!items.length) {
					highlightedSuggestionIndex = -1;
					return;
				}

				highlightedSuggestionIndex = Math.max(0, Math.min(index, items.length - 1));
				items.removeClass('active').attr('aria-selected', 'false');
				const active = items.eq(highlightedSuggestionIndex);
				active.addClass('active').attr('aria-selected', 'true');
				active[0].scrollIntoView({ block: 'nearest' });
			}

			function openSuggestionList(results, query) {
				if (!Array.isArray(results) || results.length === 0) {
					hideSuggestions();
					return;
				}

				suggestionItems = results.slice(0, 6);
				highlightedSuggestionIndex = 0;

				const menu = suggestionItems.map(function (item, index) {
					const title = escapeHtml(item.display_name || item.name || query);
					const subtitle = escapeHtml([item.class, item.type].filter(Boolean).join(' / '));

					return `
						<button
							type="button"
							class="dropdown-item"
							role="option"
							aria-selected="${index === 0 ? 'true' : 'false'}"
							data-suggestion-index="${index}"
						>
							<span class="suggestion-title">${title}</span>
							${subtitle ? `<span class="suggestion-subtitle">${subtitle}</span>` : ''}
						</button>
					`;
				}).join('');

				suggestions.html(menu).show();
				searchInput.attr('aria-expanded', 'true');
			}

			function chooseSuggestion(index) {
				const selected = suggestionItems[index];

				if (!selected) {
					return;
				}

				cancelSuggestionRequests();
				searchInput.val(selected.display_name || searchInput.val());
				hideSuggestions();
				setButtonBusy(true);
				showStatus('Resolving selected place...', 'warning');
				placeResult(selected, searchInput.val());
			}

			function placeResult(result, fallbackQuery, reverseResult) {
				const lat = Number(result.lat);
				const lon = Number(result.lon);

				if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
					showStatus('Nominatim returned an invalid location.', 'error');
					setButtonBusy(false);
					return;
				}

				if (activeReverseRequest && activeReverseRequest.abort) {
					activeReverseRequest.abort();
				}

				clearMarker();

				activeReverseRequest = $.ajax({
					url: REVERSE_ENDPOINT,
					method: 'GET',
					dataType: 'json',
					data: {
						format: 'jsonv2',
						addressdetails: 1,
						'accept-language': 'en',
						lat: lat,
						lon: lon
					}
				});

				activeReverseRequest.done(function (reverseData) {
					const popup = popupMarkup(result, reverseData || result);

					marker = L.marker([lat, lon], { title: result.display_name || fallbackQuery })
						.addTo(map)
						.bindPopup(popup, { maxWidth: 420 });

					map.flyTo([lat, lon], Math.max(map.getZoom(), 15), {
						animate: true,
						duration: 0.8
					});
					marker.openPopup();
					showStatus('Result placed on the map.', 'success');
					activeReverseRequest = null;
					setButtonBusy(false);
				});

				activeReverseRequest.fail(function (_, statusText) {
					activeReverseRequest = null;

					if (statusText === 'abort') {
						setButtonBusy(false);
						return;
					}

					const popup = popupMarkup(result, result);

					clearMarker();
					marker = L.marker([lat, lon], { title: result.display_name || fallbackQuery })
						.addTo(map)
						.bindPopup(popup, { maxWidth: 420 });

					map.flyTo([lat, lon], Math.max(map.getZoom(), 15), {
						animate: true,
						duration: 0.8
					});
					marker.openPopup();
					showStatus('Result placed on the map.', 'success');
					activeReverseRequest = null;
					setButtonBusy(false);
				});
			}

			function detailsList(details) {
				const address = details.address || {};
				const items = [];

				if (details.display_name) {
					items.push(['Display name', details.display_name]);
				}
				if (details.name && details.name !== details.display_name) {
					items.push(['Name', details.name]);
				}
				if (details.class || details.type) {
					items.push(['Category', [details.class, details.type].filter(Boolean).join(' / ')]);
				}
				if (details.importance !== undefined) {
					items.push(['Importance', String(details.importance)]);
				}
				if (details.lat !== undefined && details.lon !== undefined) {
					items.push(['Coordinates', `${details.lat}, ${details.lon}`]);
				}
				if (details.osm_type || details.osm_id !== undefined) {
					items.push(['OSM ref', [details.osm_type, details.osm_id].filter(Boolean).join(' ')]);
				}

				Object.entries(address).slice(0, 8).forEach(function ([label, value]) {
					items.push([label.replace(/_/g, ' '), value]);
				});

				return items.map(function ([label, value]) {
					return `<dt>${escapeHtml(label)}</dt><dd>${escapeHtml(value)}</dd>`;
				}).join('');
			}

			function popupMarkup(searchResult, reverseResult) {
				const source = reverseResult || searchResult;
				const heading = escapeHtml(source.display_name || searchResult.display_name || 'Search result');
				const subtitle = escapeHtml([source.class, source.type].filter(Boolean).join(' / '));
				const sourceLabel = reverseResult ? 'Reverse geocode' : 'Search result';

				return `
					<div class="map-popup">
						<div class="d-flex align-items-start justify-content-between gap-2 mb-2">
							<div class="flex-grow-1">
								<h5 class="mb-1">${heading}</h5>
								<div class="small muted">${escapeHtml(sourceLabel)}</div>
							</div>
							${subtitle ? `<span class="badge text-bg-light text-uppercase">${subtitle}</span>` : ''}
						</div>
						<dl class="kv mb-0">${detailsList(source)}</dl>
					</div>
				`;
			}

			function clearMarker() {
				if (marker) {
					map.removeLayer(marker);
					marker = null;
				}
			}

			function setButtonBusy(isBusy) {
				searchButton.prop('disabled', isBusy);
				searchButton.text(isBusy ? 'Searching…' : 'Search');
			}

			function performSearch(query) {
				const trimmedQuery = query.trim();

				if (!trimmedQuery) {
					showStatus('Enter a place name to search.', 'error');
					return;
				}

				const token = ++searchToken;

				if (activeSearchRequest && activeSearchRequest.abort) {
					activeSearchRequest.abort();
				}

				if (activeReverseRequest && activeReverseRequest.abort) {
					activeReverseRequest.abort();
				}

				cancelSuggestionRequests();
				hideSuggestions();

				clearMarker();
				setButtonBusy(true);
				showStatus(`Searching for "${trimmedQuery}"...`, 'warning');

				activeSearchRequest = $.ajax({
					url: SEARCH_ENDPOINT,
					method: 'GET',
					dataType: 'json',
					data: {
						format: 'jsonv2',
						limit: 1,
						addressdetails: 1,
						extratags: 1,
						namedetails: 1,
						'accept-language': 'en',
						q: trimmedQuery
					}
				});

				activeSearchRequest.done(function (results) {
					if (token !== searchToken) {
						return;
					}

					if (!Array.isArray(results) || results.length === 0) {
						showStatus('No results found.', 'error');
						setButtonBusy(false);
						return;
					}

					placeResult(results[0], trimmedQuery);
				});

				activeSearchRequest.fail(function (_, statusText) {
					if (token !== searchToken) {
						return;
					}

					if (statusText !== 'abort') {
						showStatus('Search failed. Check the Nominatim endpoint.', 'error');
						setButtonBusy(false);
					}
				});

				activeSearchRequest.always(function () {
					if (token === searchToken) {
						activeSearchRequest = null;
					}
				});
			}

			function fetchSuggestions(query) {
				const trimmedQuery = query.trim();
				const token = ++suggestionToken;

				if (suggestionTimer) {
					window.clearTimeout(suggestionTimer);
					suggestionTimer = null;
				}

				if (activeSuggestionRequest && activeSuggestionRequest.abort) {
					activeSuggestionRequest.abort();
				}

				if (trimmedQuery.length < 2) {
					hideSuggestions();
					return;
				}

				suggestionTimer = window.setTimeout(function () {
					activeSuggestionRequest = $.ajax({
						url: SEARCH_ENDPOINT,
						method: 'GET',
						dataType: 'json',
						data: {
							format: 'jsonv2',
							limit: 6,
							addressdetails: 1,
							namedetails: 1,
							'accept-language': 'en',
							q: trimmedQuery
						}
					});

					activeSuggestionRequest.done(function (results) {
						if (token !== suggestionToken) {
							return;
						}

						openSuggestionList(results, trimmedQuery);
					});

					activeSuggestionRequest.fail(function (_, statusText) {
						if (token !== suggestionToken || statusText === 'abort') {
							return;
						}

						hideSuggestions();
					});

					activeSuggestionRequest.always(function () {
						if (token === suggestionToken) {
							activeSuggestionRequest = null;
						}
					});
				}, 250);
			}

			form.on('submit', function (event) {
				event.preventDefault();
				const query = searchInput.val();
				hideSuggestions();
				performSearch(query);
			});

			searchInput.on('input', function () {
				fetchSuggestions(searchInput.val());
			});

			searchInput.on('keydown', function (event) {
				if (event.key === 'Escape') {
					cancelSuggestionRequests();
					searchInput.val('');
					hideSuggestions();
					hideStatus();
					return;
				}

				if (!suggestions.is(':visible')) {
					return;
				}

				if (event.key === 'ArrowDown') {
					event.preventDefault();
					highlightSuggestion(highlightedSuggestionIndex + 1);
					return;
				}

				if (event.key === 'ArrowUp') {
					event.preventDefault();
					highlightSuggestion(highlightedSuggestionIndex - 1);
					return;
				}

				if (event.key === 'Enter' && suggestionItems.length) {
					event.preventDefault();
					chooseSuggestion(Math.max(0, highlightedSuggestionIndex));
				}
			});

			suggestions.on('mouseenter', '[data-suggestion-index]', function () {
				highlightSuggestion(Number($(this).attr('data-suggestion-index')));
			});

			suggestions.on('mousedown', '[data-suggestion-index]', function (event) {
				event.preventDefault();
			});

			suggestions.on('click', '[data-suggestion-index]', function () {
				const index = Number($(this).attr('data-suggestion-index'));
				chooseSuggestion(index);
			});

			$(document).on('mousedown', function (event) {
				if (!$(event.target).closest('.search-shell').length) {
					cancelSuggestionRequests();
					hideSuggestions();
				}
			});

			map.on('click', function () {
				hideStatus();
				cancelSuggestionRequests();
				hideSuggestions();
			});

			// Start with a local-friendly center rather than an empty world view.
			showStatus('Search for a place to drop a marker.', 'warning');
			window.setTimeout(hideStatus, 3500);
		})();
	</script>
</body>
</html>
